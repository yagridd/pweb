<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 10 - Links</title>

    <style>

        body{
            margin:0;
            font-family:Trebuchet MS, Helvetica, sans-serif;
            background:#f5f5f5;
        }

        header{
            background:#00695c;
            color:white;
            text-align:center;
            padding:20px;
        }

        nav{
            background:#ffff99;
            padding:15px;
            text-align:center;
        }

        nav a:link{
            color:#006600;
            text-decoration:none;
            padding:10px;
        }

        nav a:visited{
            color:#660099;
        }

        nav a:hover{
            background:orange;
            color:red;
        }

        nav a:active{
            color:blue;
        }

        main{
            padding:30px;
            text-align:center;
        }

        footer{
            background:#00695c;
            color:white;
            text-align:center;
            padding:15px;
            margin-top:30px;
        }

    </style>

</head>

<body>

<header>
    <h1>Atividade 10 - Formação de Link</h1>
</header>

<nav>

    <a href="https://www.google.com" target="_blank">Google</a> |

    <a href="https://www.techtudo.com.br" target="_blank">Tech Tudo</a> |

    <a href="https://www.maujor.com" target="_blank">Maujor</a>

</nav>

<main>

    <h2>Bem-vindo!</h2>

    <p>Exemplo utilizando as tags HTML5: header, nav e footer.</p>

</main>

<footer>

    <p>Desenvolvido por: YAGRID NAYLLA & ANA BEATRIZ</p>

</footer>

</body>
</html>
